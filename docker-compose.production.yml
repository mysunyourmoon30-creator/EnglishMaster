services:
  englishmaster-production-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: englishmaster-production-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "${ENGLISHMASTER_PRODUCTION_SQL_PASSWORD:?Set ENGLISHMASTER_PRODUCTION_SQL_PASSWORD}"
    volumes:
      - englishmaster-production-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    # No host port published — only reachable from other containers on this network.

  englishmaster-production-api:
    build:
      context: .
      dockerfile: src/Backend/EnglishMaster.Api/Dockerfile
    container_name: englishmaster-production-api
    restart: unless-stopped
    depends_on:
      englishmaster-production-sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: "${ENGLISHMASTER_PRODUCTION_ALLOWED_HOSTS:?Set ENGLISHMASTER_PRODUCTION_ALLOWED_HOSTS to your API domain}"
      ConnectionStrings__DefaultConnection: "Server=englishmaster-production-sqlserver,1433;Database=EnglishMaster;User Id=sa;Password=${ENGLISHMASTER_PRODUCTION_SQL_PASSWORD:?Set ENGLISHMASTER_PRODUCTION_SQL_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      DevelopmentSeed__Enabled: "false"
      Auth__InitialSuperAdmin__Email: "${ENGLISHMASTER_PRODUCTION_SUPERADMIN_EMAIL:-}"
      Auth__InitialSuperAdmin__Password: "${ENGLISHMASTER_PRODUCTION_SUPERADMIN_PASSWORD:-}"
      Media__LocalStoragePath: /app/media
      Publishing__LocalStoragePath: /app/publishing
      Email__Provider: "${ENGLISHMASTER_PRODUCTION_EMAIL_PROVIDER:-Development}"
      Email__FromEmail: "${ENGLISHMASTER_PRODUCTION_EMAIL_FROM:-}"
      Email__Smtp__Host: "${ENGLISHMASTER_PRODUCTION_SMTP_HOST:-}"
      Email__Smtp__Port: "${ENGLISHMASTER_PRODUCTION_SMTP_PORT:-587}"
      Email__Smtp__UserName: "${ENGLISHMASTER_PRODUCTION_SMTP_USERNAME:-}"
      Email__Smtp__Password: "${ENGLISHMASTER_PRODUCTION_SMTP_PASSWORD:-}"
      SystemHealthWorker__AlertRecipientEmail: "${ENGLISHMASTER_PRODUCTION_ALERT_EMAIL:-}"
    volumes:
      - englishmaster-production-api-media:/app/media
      - englishmaster-production-api-publishing:/app/publishing
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep \"200\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    # No host port published — only reachable through the reverse proxy below.

  englishmaster-production-web:
    build:
      context: .
      dockerfile: src/Frontend/EnglishMaster.Web/Dockerfile
    container_name: englishmaster-production-web
    restart: unless-stopped
    depends_on:
      englishmaster-production-api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: "${ENGLISHMASTER_PRODUCTION_ALLOWED_HOSTS:?Set ENGLISHMASTER_PRODUCTION_ALLOWED_HOSTS to your Web domain}"
      ApiBaseUrl: http://englishmaster-production-api:8080/
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep \"200\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    # No host port published — only reachable through the reverse proxy below.

  englishmaster-production-proxy:
    image: caddy:2-alpine
    container_name: englishmaster-production-proxy
    restart: unless-stopped
    depends_on:
      - englishmaster-production-web
      - englishmaster-production-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - englishmaster-production-caddy-data:/data
      - englishmaster-production-caddy-config:/config

volumes:
  englishmaster-production-sqlserver-data:
  englishmaster-production-api-media:
  englishmaster-production-api-publishing:
  englishmaster-production-caddy-data:
  englishmaster-production-caddy-config:
