services:
  englishmaster-staging-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: englishmaster-staging-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "${ENGLISHMASTER_STAGING_SQL_PASSWORD:?Set ENGLISHMASTER_STAGING_SQL_PASSWORD}"
    ports:
      - "${ENGLISHMASTER_STAGING_SQL_PORT:-14334}:1433"
    volumes:
      - englishmaster-staging-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  englishmaster-staging-api:
    build:
      context: .
      dockerfile: src/Backend/EnglishMaster.Api/Dockerfile
    container_name: englishmaster-staging-api
    depends_on:
      englishmaster-staging-sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Staging}"
      ASPNETCORE_URLS: "http://+:8080"
      AllowedHosts: "${ENGLISHMASTER_STAGING_ALLOWED_HOSTS:-*}"
      ConnectionStrings__DefaultConnection: "Server=englishmaster-staging-sqlserver,1433;Database=${ENGLISHMASTER_STAGING_DATABASE:-EnglishMasterStaging};User Id=sa;Password=${ENGLISHMASTER_STAGING_SQL_PASSWORD:?Set ENGLISHMASTER_STAGING_SQL_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      DevelopmentSeed__Enabled: "${ENGLISHMASTER_STAGING_DEVELOPMENT_SEED_ENABLED:-false}"
      Auth__InitialSuperAdmin__Email: "${ENGLISHMASTER_STAGING_SUPERADMIN_EMAIL:-}"
      Auth__InitialSuperAdmin__Password: "${ENGLISHMASTER_STAGING_SUPERADMIN_PASSWORD:-}"
      Media__LocalStoragePath: "${ENGLISHMASTER_STAGING_MEDIA_PATH:-/app/media}"
      Publishing__LocalStoragePath: "${ENGLISHMASTER_STAGING_PUBLISHING_PATH:-/app/publishing}"
      Email__Provider: "${ENGLISHMASTER_STAGING_EMAIL_PROVIDER:-Development}"
      Email__FromAddress: "${ENGLISHMASTER_STAGING_EMAIL_FROM:-}"
    ports:
      - "${ENGLISHMASTER_STAGING_API_PORT:-7101}:8080"
    volumes:
      - englishmaster-staging-api-media:/app/media
      - englishmaster-staging-api-publishing:/app/publishing
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep \"200\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  englishmaster-staging-web:
    build:
      context: .
      dockerfile: src/Frontend/EnglishMaster.Web/Dockerfile
    container_name: englishmaster-staging-web
    depends_on:
      englishmaster-staging-api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Staging}"
      ASPNETCORE_URLS: "http://+:8080"
      AllowedHosts: "${ENGLISHMASTER_STAGING_ALLOWED_HOSTS:-*}"
      ApiBaseUrl: "${ENGLISHMASTER_STAGING_API_BASE_URL:-http://englishmaster-staging-api:8080/}"
    ports:
      - "${ENGLISHMASTER_STAGING_WEB_PORT:-7102}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /health/live HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 1 <&3 | grep \"200\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  englishmaster-staging-sqlserver-data:
  englishmaster-staging-api-media:
  englishmaster-staging-api-publishing:
